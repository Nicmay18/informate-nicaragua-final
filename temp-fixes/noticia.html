<style>
/* ═══════════════════════════════════════════
   EDITORIAL DESIGN SYSTEM — Nicaragua Informate
   Inspirado en: BBC, NYT, RT, The Guardian
   ═══════════════════════════════════════════ */

:root {
  --ink: #0a0a0a;
  --ink-soft: #1f1f1f;
  --ink-muted: #4a4a4a;
  --ink-light: #737373;
  --ink-faint: #a3a3a3;
  --paper: #ffffff;
  --paper-warm: #faf9f7;
  --paper-accent: #f5f3ef;
  --border-light: #e5e2de;
  --border-medium: #d4d0ca;
  --brand: #b91c1c;
  --brand-dark: #991b1b;
  --brand-soft: rgba(185, 28, 28, 0.06);
  --premium-gold: #b45309;
  --premium-bg: #fffbeb;
  --premium-border: #fcd34d;
  --font-serif: 'Crimson Pro', 'Times New Roman', Georgia, serif;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.10);
  --radius-sm: 4px;
  --radius-md: 8px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { 
  scroll-behavior: smooth; 
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: var(--font-sans);
  background: var(--paper);
  color: var(--ink);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* ═══════════════════════════════════════════
   HEADER — Editorial Masthead
   ═══════════════════════════════════════════ */
.masthead {
  background: var(--paper);
  border-bottom: 1px solid var(--border-light);
  position: sticky;
  top: 0;
  z-index: 1000;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background-color: rgba(255,255,255,0.95);
}

.masthead-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.masthead-brand {
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
  color: var(--ink);
}

.masthead-brand img {
  width: 38px;
  height: 38px;
  border-radius: var(--radius-sm);
  object-fit: cover;
  box-shadow: var(--shadow-sm);
}

.masthead-brand-text {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--ink);
  line-height: 1.2;
}

.masthead-brand-text span {
  color: var(--brand);
}

.masthead-nav {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  transition: all 0.2s ease;
  border: 1px solid transparent;
  color: var(--ink-muted);
  background: transparent;
  cursor: pointer;
}

.nav-btn:hover {
  background: var(--paper-accent);
  color: var(--ink);
  border-color: var(--border-light);
}

.nav-btn.primary {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}

.nav-btn.primary:hover {
  background: var(--ink-soft);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

/* ═══════════════════════════════════════════
   BREADCRUMB
   ═══════════════════════════════════════════ */
.breadcrumb {
  max-width: 720px;
  margin: 0 auto;
  padding: 16px 24px 0;
  font-size: 12px;
  color: var(--ink-faint);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.breadcrumb a {
  color: var(--ink-light);
  text-decoration: none;
  font-weight: 500;
  transition: color 0.2s;
}
.breadcrumb a:hover {
  color: var(--brand);
}
.breadcrumb-sep {
  color: var(--border-medium);
}
.breadcrumb-current {
  color: var(--ink-faint);
  font-weight: 400;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 300px;
}

/* ═══════════════════════════════════════════
   ARTICLE LAYOUT — Centered Editorial
   ═══════════════════════════════════════════ */
.article-wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 16px 24px 80px;
}

/* ═══════════════════════════════════════════
   ARTICLE HEADER — Kicker, Title, Meta
   ═══════════════════════════════════════════ */
.article-kicker {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}

.kicker-label {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--brand);
  padding: 4px 10px;
  background: var(--brand-soft);
  border-radius: var(--radius-sm);
}

.kicker-divider {
  flex: 1;
  height: 1px;
  background: var(--border-light);
}

.kicker-date {
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.article-headline {
  font-family: var(--font-serif);
  font-size: clamp(32px, 5vw, 52px);
  font-weight: 700;
  line-height: 1.12;
  letter-spacing: -0.025em;
  color: var(--ink);
  margin-bottom: 24px;
}

.article-deck {
  font-family: var(--font-serif);
  font-size: clamp(18px, 2.5vw, 22px);
  font-weight: 400;
  font-style: italic;
  line-height: 1.45;
  color: var(--ink-muted);
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border-light);
}

/* ═══════════════════════════════════════════
   ARTICLE META — Author, Date, Reading time
   ═══════════════════════════════════════════ */
.article-meta-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border-light);
}

.meta-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.author-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 14px;
  font-weight: 700;
  flex-shrink: 0;
}

.author-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.author-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
}

.author-role {
  font-size: 12px;
  color: var(--ink-faint);
  font-weight: 500;
}

.meta-stats {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--ink-faint);
  font-weight: 500;
}

.meta-stats span {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

/* ═══════════════════════════════════════════
   HERO IMAGE — With Editorial Caption
   ═══════════════════════════════════════════ */
.figure-hero {
  margin: 0 0 40px 0;
  position: relative;
}

.figure-hero img {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  object-position: center 25%;
  border-radius: var(--radius-md);
  display: block;
  box-shadow: var(--shadow-md);
}

.figure-caption {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-top: 12px;
  padding: 12px 0 0 0;
  border-top: 2px solid var(--ink);
}

.caption-line {
  width: 24px;
  height: 2px;
  background: var(--brand);
  margin-top: 10px;
  flex-shrink: 0;
}

.caption-text {
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.6;
  color: var(--ink-muted);
  font-weight: 400;
}

.caption-text strong {
  color: var(--ink);
  font-weight: 600;
}

.caption-credit {
  display: block;
  margin-top: 4px;
  font-size: 11px;
  color: var(--ink-faint);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ═══════════════════════════════════════════
   ARTICLE BODY — Typography
   ═══════════════════════════════════════════ */
.article-body {
  font-family: var(--font-serif);
  font-size: clamp(17px, 1.8vw, 20px);
  line-height: 1.75;
  color: var(--ink-soft);
}

.article-body p {
  margin-bottom: 1.6em;
  text-align: justify;
  hyphens: auto;
  -webkit-hyphens: auto;
}

/* DROP CAP — Letra Capital Editorial */
.article-body > p:first-of-type::first-letter {
  font-family: var(--font-serif);
  font-size: 5.2em;
  font-weight: 700;
  float: left;
  line-height: 0.78;
  margin-right: 14px;
  margin-top: 6px;
  color: var(--ink);
  text-shadow: 2px 2px 0 var(--border-light);
}

/* Primera línea en small caps opcional */
.article-body > p:first-of-type::first-line {
  font-variant: small-caps;
  font-weight: 600;
  letter-spacing: 0.02em;
}

/* ═══════════════════════════════════════════
   INLINE IMAGES WITHIN ARTICLE
   ═══════════════════════════════════════════ */
.article-figure {
  margin: 40px 0;
  position: relative;
}

.article-figure img {
  width: 100%;
  border-radius: var(--radius-sm);
  display: block;
  box-shadow: var(--shadow-sm);
}

.article-figure .figure-caption {
  border-top: none;
  border-left: 3px solid var(--brand);
  padding: 8px 0 8px 14px;
  margin-top: 10px;
}

.article-figure .caption-line {
  display: none;
}

/* ═══════════════════════════════════════════
   BLOCKQUOTE — Pull Quote Editorial
   ═══════════════════════════════════════════ */
.blockquote-pull {
  margin: 40px 0;
  padding: 28px 32px;
  background: var(--paper-accent);
  border-left: 4px solid var(--brand);
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  position: relative;
}

.blockquote-pull::before {
  content: '"';
  font-family: var(--font-serif);
  font-size: 64px;
  color: var(--brand);
  opacity: 0.15;
  position: absolute;
  top: -8px;
  left: 16px;
  line-height: 1;
}

.blockquote-pull p {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 600;
  font-style: italic;
  line-height: 1.45;
  color: var(--ink);
  position: relative;
  z-index: 1;
  margin-bottom: 12px;
}

.blockquote-pull cite {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-light);
  font-style: normal;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ═══════════════════════════════════════════
   PREMIUM PAYWALL — Elegant Gate
   ═══════════════════════════════════════════ */
.premium-gate {
  margin: 48px 0;
  padding: 48px 40px;
  background: linear-gradient(180deg, var(--premium-bg) 0%, #fff 100%);
  border: 1px solid var(--premium-border);
  border-radius: var(--radius-md);
  text-align: center;
  position: relative;
  overflow: hidden;
}

.premium-gate::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--premium-gold), #f59e0b, var(--premium-gold));
}

.premium-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, #fbbf24, #d97706);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 28px;
  color: white;
  box-shadow: 0 4px 16px rgba(217, 119, 6, 0.25);
}

.premium-gate h3 {
  font-family: var(--font-serif);
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 10px;
}

.premium-gate > p {
  font-size: 15px;
  color: var(--ink-muted);
  max-width: 420px;
  margin: 0 auto 28px;
  line-height: 1.6;
}

.premium-features {
  background: var(--paper);
  border-radius: var(--radius-md);
  padding: 24px;
  margin: 0 auto 28px;
  max-width: 400px;
  text-align: left;
  border: 1px solid var(--border-light);
}

.premium-features h4 {
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-light);
  margin-bottom: 16px;
  text-align: center;
}

.premium-features ul {
  list-style: none;
  display: grid;
  gap: 10px;
}

.premium-features li {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  color: var(--ink-muted);
}

.premium-features li i {
  color: var(--premium-gold);
  font-size: 14px;
  width: 18px;
  text-align: center;
}

.premium-cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 32px;
  background: linear-gradient(135deg, #f59e0b, #d97706);
  color: white;
  border: none;
  border-radius: 999px;
  font-family: var(--font-sans);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.25s ease;
  box-shadow: 0 4px 16px rgba(217, 119, 6, 0.3);
}

.premium-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(217, 119, 6, 0.4);
}

.premium-donate {
  display: block;
  margin-top: 16px;
  font-size: 13px;
  color: var(--ink-faint);
}

.premium-donate a {
  color: var(--premium-gold);
  font-weight: 600;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.content-veil {
  position: relative;
  max-height: 180px;
  overflow: hidden;
  pointer-events: none;
  user-select: none;
}

.content-veil::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 140px;
  background: linear-gradient(to bottom, transparent, var(--paper));
}

/* ═══════════════════════════════════════════
   SHARE — Social Actions
   ═══════════════════════════════════════════ */
.share-panel {
  margin: 56px 0 0;
  padding: 28px 0;
  border-top: 1px solid var(--border-light);
  border-bottom: 1px solid var(--border-light);
}

.share-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-faint);
  margin-bottom: 16px;
}

.share-grid {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.share-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.2s ease;
  border: 1px solid var(--border-light);
  background: var(--paper);
  color: var(--ink-muted);
  cursor: pointer;
}

.share-chip:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
  border-color: var(--border-medium);
  color: var(--ink);
}

.share-chip.facebook:hover { background: #1877f2; color: white; border-color: #1877f2; }
.share-chip.whatsapp:hover { background: #25d366; color: white; border-color: #25d366; }
.share-chip.telegram:hover { background: #0088cc; color: white; border-color: #0088cc; }
.share-chip.twitter:hover { background: #0f1419; color: white; border-color: #0f1419; }

/* ═══════════════════════════════════════════
   TAGS
   ═══════════════════════════════════════════ */
.tags-bar {
  margin-top: 32px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag {
  padding: 6px 14px;
  background: var(--paper-accent);
  border: 1px solid var(--border-light);
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-muted);
  text-decoration: none;
  transition: all 0.2s;
}

.tag:hover {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}

/* ═══════════════════════════════════════════
   FOOTER — Minimal Editorial
   ═══════════════════════════════════════════ */
.site-footer {
  background: var(--ink);
  color: var(--ink-faint);
  padding: 48px 24px 32px;
  margin-top: 80px;
}

.site-footer-inner {
  max-width: 720px;
  margin: 0 auto;
  text-align: center;
}

.footer-masthead {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 700;
  color: var(--paper);
  margin-bottom: 8px;
}

.footer-tagline {
  font-size: 13px;
  color: var(--ink-light);
  margin-bottom: 24px;
}

.footer-divider {
  width: 40px;
  height: 1px;
  background: var(--ink-muted);
  margin: 0 auto 24px;
}

.footer-social {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 24px;
}

.footer-social a {
  color: var(--ink-light);
  font-size: 18px;
  transition: all 0.2s;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  border: 1px solid transparent;
}

.footer-social a:hover {
  color: var(--paper);
  background: rgba(255,255,255,0.08);
  border-color: var(--ink-muted);
  transform: translateY(-2px);
}

.footer-legal {
  font-size: 12px;
  color: var(--ink-muted);
  line-height: 1.8;
}

/* ═══════════════════════════════════════════
   SKELETON LOADER — Editorial Style
   ═══════════════════════════════════════════ */
.skeleton-wrap {
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.skel {
  background: linear-gradient(90deg, var(--paper-accent) 25%, #edeae6 50%, var(--paper-accent) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.6s infinite;
  border-radius: var(--radius-sm);
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.skel-kicker { height: 24px; width: 120px; margin-bottom: 20px; }
.skel-title { height: 52px; width: 100%; margin-bottom: 16px; }
.skel-title:nth-child(3) { width: 75%; margin-bottom: 24px; }
.skel-meta { height: 20px; width: 280px; margin-bottom: 32px; }
.skel-image { width: 100%; aspect-ratio: 16/9; margin: 32px 0; border-radius: var(--radius-md); }
.skel-text { height: 14px; margin-bottom: 14px; }
.skel-text:nth-last-child(1) { width: 60%; }
.skel-text:nth-last-child(2) { width: 85%; }
.skel-text:nth-last-child(3) { width: 95%; }

/* ═══════════════════════════════════════════
   READING PROGRESS BAR
   ═══════════════════════════════════════════ */
.read-progress {

/* ═══════════════════════════════════════════

@media (max-width: 640px) {

  color: var(--paper);
}

img { max-width: 100%; height: auto; }

/* Hide skeleton when content loads */
.loaded .skeleton-wrap { display: none; }

<script type="module">
// ═══════════════════════════════════════════
// FIREBASE SETUP
// ═══════════════════════════════════════════
import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
import { getFirestore, doc, getDoc, updateDoc, increment, query, where, limit, collection, getDocs } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDVsqRGr7dtdi5ecO14THIdbnEzKKOJxcA",
  authDomain: "informate-instant-nicaragua.firebaseapp.com",
  projectId: "informate-instant-nicaragua",
  storageBucket: "informate-instant-nicaragua.firebasestorage.app",
  messagingSenderId: "24988088146",
  appId: "1:24988088146:web:d26a207508da055668ec8b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ═══════════════════════════════════════════
// URL PARAMS
// ═══════════════════════════════════════════
const urlParams = new URLSearchParams(window.location.search);
const noticiaId = urlParams.get('id');
const noticiaSlug = urlParams.get('slug');

if (!noticiaId && !noticiaSlug) {
  window.location.href = '/';
}

// ═══════════════════════════════════════════
// IMAGE REPAIR SYSTEM
// ═══════════════════════════════════════════
const PLACEHOLDERS = {
  'Sucesos': 'https://images.unsplash.com/photo-1588681664899-f142ff2dc9b1?w=1200&q=85',
  'Nacionales': 'https://images.unsplash.com/photo-1526666923127-b2970f64b422?w=1200&q=85',
  'Deportes': 'https://images.unsplash.com/photo-1461896836934-f66c71d1ef65?w=1200&q=85',
  'Internacionales': 'https://images.unsplash.com/photo-1526304640152-d4619684e484?w=1200&q=85',
  'Economía': 'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=1200&q=85',
  'Cultura': 'https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=1200&q=85',
  'Espectáculos': 'https://images.unsplash.com/photo-1516280440614-6697288d5d38?w=1200&q=85'
};

function repairImage(imgValue, categoria) {
  const fallback = PLACEHOLDERS[categoria] || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=1200&q=85';

  if (!imgValue || imgValue === "NaN" || imgValue === "null" || imgValue === "undefined" || imgValue === "") {
    return fallback;
  }
  if (typeof imgValue !== 'string') return fallback;

  // URL completa válida (no GitHub ni Firebase roto)
  if (imgValue.startsWith('http') && !imgValue.includes('githubusercontent') && !imgValue.includes('firebasestorage')) {
    return imgValue;
  }

  // Extraer nombre de archivo
  let fileName = imgValue.split('/').pop().split('\\').pop();

  if (imgValue.includes('firebasestorage.googleapis.com')) {
    try {
      const decoded = decodeURIComponent(imgValue);
      const match = decoded.match(/images%2F([^?]+)/);
      if (match) fileName = match[1];
    } catch(e) {}
  }

  fileName = fileName.replace(/\.(webp|jpg|jpeg|png|gif|bmp|svg)$/i, '').trim();

  if (!fileName || fileName.includes('collage') || fileName.includes('luto') || fileName.includes('normal')) {
    return fallback;
  }

  return `https://cdn.jsdelivr.net/gh/Nicmay18/informate-nicaragua@main/public/images/${fileName}.webp`;
}

// ═══════════════════════════════════════════
// ESCAPE HTML
// ═══════════════════════════════════════════
function esc(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ═══════════════════════════════════════════
// FORMAT DATE
// ═══════════════════════════════════════════
function fmtDate(ts) {
  if (!ts) return 'Hace un momento';
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('es-NI', { day: 'numeric', month: 'long', year: 'numeric' });
  } catch(e) { return 'Hace un momento'; }
}

// ═══════════════════════════════════════════
// READING TIME
// ═══════════════════════════════════════════
function readingTime(text) {
  const words = text.trim().split(/\s+/).length;
  const mins = Math.ceil(words / 200);
  return `${mins} min de lectura`;
}

// ═══════════════════════════════════════════
// RENDER ARTICLE
// ═══════════════════════════════════════════
function renderArticle(n, docRef) {
  const isPremium = n.premium === true;
  const imgUrl = repairImage(n.imagen, n.categoria);
  const fechaStr = fmtDate(n.fecha);
  const readTime = readingTime(n.contenido || '');
  const autor = n.autor || 'Keyling E. Muñoz R.';
  const autorInitial = autor.charAt(0).toUpperCase();

  // Update meta
  document.title = `${n.titulo} | Nicaragua Informate`;
  document.getElementById('pageDescription').content = n.resumen || n.titulo;
  document.getElementById('ogTitle').content = n.titulo;
  document.getElementById('ogDescription').content = n.resumen || n.titulo;
  document.getElementById('ogImage').content = imgUrl;

  // Update Schema.org NewsArticle
  const schemaEl = document.getElementById('schemaNewsArticle');
  if (schemaEl) {
    const fechaISO = n.fecha ? (n.fecha.toDate ? n.fecha.toDate().toISOString() : new Date(n.fecha).toISOString()) : new Date().toISOString();
    const fechaMod = n.fechaActualizacion ? (n.fechaActualizacion.toDate ? n.fechaActualizacion.toDate().toISOString() : new Date(n.fechaActualizacion).toISOString()) : fechaISO;
    schemaEl.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "NewsArticle",
      "headline": n.titulo,
      "description": n.resumen || n.titulo,
      "image": imgUrl,
      "datePublished": fechaISO,
      "dateModified": fechaMod,
      "author": {
        "@type": "Person",
        "name": autor,
        "url": "https://nicaraguainformate.com"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Nicaragua Informate",
        "logo": {
          "@type": "ImageObject",
          "url": "https://nicaraguainformate.com/logo.png"
        }
      },
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": location.href
      },
      "articleSection": n.categoria || 'General',
      "wordCount": (n.contenido || '').split(/\s+/).length
    }, null, 2);
  }

  // Update breadcrumb
  const bcCat = document.getElementById('breadcrumbCat');
  if (bcCat) bcCat.innerHTML = `<a href="/">${esc(n.categoria || 'General')}</a>`;
  document.getElementById('breadcrumbCurrent').textContent = esc(n.titulo).substring(0, 60) + (n.titulo.length > 60 ? '...' : '');

  // Process content paragraphs
  const allPars = (n.contenido || '').split('\n').filter(p => p.trim());

  // Build hero figure with editorial caption + credits
  const creditText = n.pieFoto ? `${esc(n.pieFoto)} — ` : '';
  const heroFigure = `
    <figure class="figure-hero">
      <img src="${imgUrl}" alt="${esc(n.titulo)}" loading="eager"
        onerror="this.onerror=null;this.src='${PLACEHOLDERS[n.categoria] || PLACEHOLDERS['Nacionales']}'"
        style="width:100%;max-height:520px;object-fit:cover;">
      <figcaption class="figure-caption">
        <span class="caption-line"></span>
        <div class="caption-text">
          ${creditText}<strong>${esc(n.categoria || 'General')}</strong>
          <span class="caption-credit">Nicaragua Informate / Archivo</span>
        </div>
      </figcaption>
    </figure>
  `;

  // Build article body
  let bodyHTML = '';

  if (isPremium) {
    const previewPars = allPars.slice(0, 2);
    const hiddenPars = allPars.slice(2);

    bodyHTML = `
      <div class="article-body">
        ${previewPars.map(p => `<p>${esc(p)}</p>`).join('')}
      </div>

      <div class="premium-gate">
        <div class="premium-icon"><i class="fas fa-gem"></i></div>
        <h3>Contenido exclusivo para suscriptores</h3>
        <p>Accede al análisis completo de esta noticia y a todo nuestro contenido premium sin límites.</p>

        <div class="premium-features">
          <h4>Beneficios de suscripción</h4>
          <ul>
            <li><i class="fas fa-check-circle"></i> Acceso ilimitado a noticias premium</li>
            <li><i class="fas fa-check-circle"></i> Lectura sin publicidad</li>
            <li><i class="fas fa-check-circle"></i> Análisis profundos y exclusivos</li>
            <li><i class="fas fa-check-circle"></i> Apoyo al periodismo independiente</li>
          </ul>
        </div>

        <a href="https://paypal.me/NicaraguaInformate/5" target="_blank" class="premium-cta">
          <i class="fas fa-crown"></i>
          Suscribirme — $5/mes
        </a>

        <span class="premium-donate">
          ¿Prefieres donar una vez? <a href="https://paypal.me/NicaraguaInformate" target="_blank">Haz una donación</a>
        </span>
      </div>

      <div class="content-veil">
        <div class="article-body" style="filter: blur(6px);">
          ${hiddenPars.map(p => `<p>${esc(p)}</p>`).join('')}
        </div>
      </div>
    `;
  } else {
    bodyHTML = `
      <div class="article-body">
        ${allPars.map(p => `<p>${esc(p)}</p>`).join('')}
      </div>

      <div class="share-panel">
        <div class="share-label">Compartir artículo</div>
        <div class="share-grid">
          <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}" target="_blank" class="share-chip facebook">
            <i class="fab fa-facebook-f"></i> Facebook
          </a>
          <a href="https://wa.me/?text=${encodeURIComponent(n.titulo + ' — ' + location.href)}" target="_blank" class="share-chip whatsapp">
            <i class="fab fa-whatsapp"></i> WhatsApp
          </a>
          <a href="https://t.me/share/url?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent(n.titulo)}" target="_blank" class="share-chip telegram">
            <i class="fab fa-telegram-plane"></i> Telegram
          </a>
          <a href="https://twitter.com/intent/tweet?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent(n.titulo)}" target="_blank" class="share-chip twitter">
            <i class="fab fa-x-twitter"></i> X / Twitter
          </a>
        </div>
      </div>

      <div class="tags-bar">
        <span class="tag">#${esc(n.categoria || 'General').replace(/\s/g, '')}</span>
        <span class="tag">#Nicaragua</span>
        <span class="tag">#Noticias</span>
      </div>
    `;
  }

  // Kicker
  const kickerHTML = isPremium
    ? `<span class="kicker-label"><i class="fas fa-gem" style="font-size:9px;margin-right:4px;"></i>Premium</span>`
    : `<span class="kicker-label">${esc(n.categoria || 'General')}</span>`;

  // Assemble
  const html = `
    <header class="article-header">
      <div class="article-kicker">
        ${kickerHTML}
        <span class="kicker-divider"></span>
        <span class="kicker-date">${fechaStr}</span>
      </div>

      <h1 class="article-headline">${esc(n.titulo)}</h1>

      ${n.resumen ? `<p class="article-deck">${esc(n.resumen)}</p>` : ''}

      <div class="article-meta-bar">
        <div class="meta-author">
          <div class="author-avatar">${autorInitial}</div>
          <div class="author-info">
            <span class="author-name">${esc(autor)}</span>
            <span class="author-role">Redacción Nicaragua Informate</span>
          </div>
        </div>
        <div class="meta-stats">
          <span><i class="far fa-calendar"></i> ${fechaStr}${n.fechaActualizacion ? ' <em style="color:var(--ink-light);font-style:italic;">(Actualizado)</em>' : ''}</span>
          <span><i class="far fa-clock"></i> ${readTime}</span>
          <span><i class="far fa-eye"></i> ${(n.vistas || 0).toLocaleString()} lecturas</span>
        </div>
      </div>
    </header>

    ${heroFigure}

    ${bodyHTML}
  `;

  document.getElementById('articleContent').innerHTML = html;
  document.getElementById('skeletonLoader').style.display = 'none';
  document.getElementById('articleContent').style.display = 'block';
  document.body.classList.add('loaded');

  // Increment views
  if (docRef) {
    updateDoc(docRef, { vistas: increment(1) }).catch(() => {});
  }
}

// ═══════════════════════════════════════════
// LOAD ARTICLE
// ═══════════════════════════════════════════
async function loadArticle() {
  try {
    let noticia = null;
    let docRef = null;

    if (noticiaId) {
      docRef = doc(db, 'noticias', noticiaId);
      const snap = await getDoc(docRef);
      if (snap.exists()) noticia = snap.data();
    } else if (noticiaSlug) {
      const q = query(collection(db, 'noticias'), where('slug', '==', noticiaSlug), limit(1));
      const snap = await getDocs(q);
      if (!snap.empty) {
        const d = snap.docs[0];
        noticia = d.data();
        docRef = doc(db, 'noticias', d.id);
      }
    }

    if (!noticia) {
      window.location.href = '/';
      return;
    }

    renderArticle(noticia, docRef);

  } catch (err) {
    console.error('Error cargando noticia:', err);
    window.location.href = '/';
  }
}

// ═══════════════════════════════════════════
// READING PROGRESS BAR
// ═══════════════════════════════════════════
function initProgress() {
  const bar = document.getElementById('readProgress');
  window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    bar.style.width = progress + '%';
  }, { passive: true });
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
loadArticle();
initProgress();
</script>
