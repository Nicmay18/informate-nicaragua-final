<style>
/* ═══════════════════════════════════════════
   EDITORIAL DESIGN SYSTEM — Nicaragua Informate
   Inspirado en: BBC, NYT, RT, The Guardian
   ═══════════════════════════════════════════ */

:root {
  --ink: #18181b;
  --ink-soft: #27272a;
  --ink-muted: #5b5b5f;
  --ink-light: #756d66;
  --ink-faint: #9f968d;
  --paper: #fffdf9;
  --paper-warm: #f7f4ee;
  --paper-accent: #f1ece4;
  --border-light: #ddd6ce;
  --border-medium: #c6beb5;
  --brand: #8c1d18;
  --accent: #8c1d18;
  --brand-dark: #6f1713;
  --brand-soft: rgba(140, 29, 24, 0.07);
  --premium-gold: #9a3412;
  --premium-bg: #f6efe4;
  --premium-border: #d6b38a;
  --font-serif: 'Crimson Pro', 'Times New Roman', Georgia, serif;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --shadow-sm: 0 1px 2px rgba(24,24,27,0.05);
  --shadow-md: 0 10px 24px rgba(24,24,27,0.08);
  --shadow-lg: 0 20px 44px rgba(24,24,27,0.12);
  --radius-sm: 4px;
  --radius-md: 8px;
  --theme-btn-bg: rgba(255,253,249,0.92);
  --theme-btn-border: rgba(198,190,181,0.9);
  --theme-btn-shadow: 0 10px 22px rgba(24,24,27,0.08);
}

[data-theme="dark"] {
  --ink: #f5f3ef;
  --ink-soft: #e7e0d7;
  --ink-muted: #d6d0c7;
  --ink-light: #b3aaa1;
  --ink-faint: #8a8178;
  --paper: #141416;
  --paper-warm: #111214;
  --paper-accent: #1d1d21;
  --border-light: #3a383f;
  --border-medium: #4a464d;
  --brand-soft: rgba(140, 29, 24, 0.18);
  --premium-bg: #211b18;
  --premium-border: #6b4d3a;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.35);
  --shadow-md: 0 8px 20px rgba(0,0,0,0.34);
  --shadow-lg: 0 16px 44px rgba(0,0,0,0.42);
  --theme-btn-bg: rgba(29,29,33,0.92);
  --theme-btn-border: rgba(74,70,77,0.95);
  --theme-btn-shadow: 0 12px 30px rgba(0,0,0,0.32);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { 
  scroll-behavior: smooth; 
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: var(--font-sans);
  background: var(--paper);
  color: var(--ink);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* ═══════════════════════════════════════════
   HEADER — Editorial Masthead
   ═══════════════════════════════════════════ */
.masthead {
  background: var(--paper);
  border-bottom: 1px solid var(--border-light);
  position: sticky;
  top: 0;
  z-index: 1000;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background-color: rgba(255,255,255,0.95);
}

[data-theme="dark"] .masthead {
  background-color: rgba(24,22,21,0.98);
}

.masthead-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.masthead-brand {
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
  color: var(--ink);
}

.masthead-brand img {
  width: 38px;
  height: 38px;
  border-radius: 8px;
  object-fit: cover;
  box-shadow: none;
}

.masthead-brand-text {
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--brand);
  line-height: 1.05;
}

.masthead-brand-text span {
  color: inherit;
}

.masthead-nav {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.01em;
  text-decoration: none;
  transition: all 0.2s ease;
  border: 1px solid var(--border-light);
  color: var(--ink-muted);
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
  white-space: nowrap;
}

.nav-btn:hover {
  background: var(--paper-accent);
  color: var(--ink);
  border-color: var(--border-light);
}

.masthead-nav .nav-btn {
  box-shadow: none;
}

.nav-btn.primary {
  background: transparent;
  color: var(--ink);
  border-color: var(--border-medium);
}

.nav-btn.primary:hover {
  background: var(--paper-accent);
  transform: translateY(-1px);
  box-shadow: none;
}

.theme-toggle {
  width: 42px;
  height: 42px;
  padding: 0;
  justify-content: center;
  border-radius: 10px;
  background: var(--theme-btn-bg);
  border: 1px solid var(--theme-btn-border);
  color: var(--ink);
  box-shadow: none;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}

.theme-toggle:hover {
  transform: translateY(-1px);
  box-shadow: none;
}

[data-theme="dark"] .theme-toggle:hover {
  box-shadow: 0 16px 36px rgba(0,0,0,0.4);
}

.theme-toggle i {
  font-size: 15px;
}

/* ═══════════════════════════════════════════
   BREADCRUMB
   ═══════════════════════════════════════════ */
.breadcrumb {
  max-width: 720px;
  margin: 0 auto;
  padding: 16px 24px 0;
  font-size: 12px;
  color: var(--ink-faint);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.breadcrumb a {
  color: var(--ink-light);
  text-decoration: none;
  font-weight: 500;
  transition: color 0.2s;
}
.breadcrumb a:hover {
  color: var(--brand);
}
.breadcrumb-sep {
  color: var(--border-medium);
}
.breadcrumb-current {
  color: var(--ink-faint);
  font-weight: 400;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 300px;
}

/* ═══════════════════════════════════════════
   ARTICLE LAYOUT — Centered Editorial
   ═══════════════════════════════════════════ */
.article-wrap {
  max-width: 780px;
  margin: 0 auto;
  padding: 28px 28px 88px;
}

/* ═══════════════════════════════════════════
   ARTICLE HEADER — Kicker, Title, Meta
   ═══════════════════════════════════════════ */
.article-kicker {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}

.kicker-label {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--brand);
  padding: 6px 12px;
  background: var(--brand-soft);
  border-radius: 3px;
}

.kicker-divider {
  flex: 1;
  height: 1px;
  background: var(--border-light);
}

.kicker-date {
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.article-headline {
  font-family: var(--font-serif);
  font-size: clamp(32px, 4.5vw, 52px);
  font-weight: 700;
  line-height: 1.08;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin-bottom: 16px;
}

.article-deck {
  font-family: var(--font-sans);
  font-size: clamp(17px, 1.9vw, 20px);
  font-weight: 400;
  line-height: 1.6;
  color: var(--ink-soft);
  margin-bottom: 20px;
}

/* ═══════════════════════════════════════════
   ARTICLE META — Author, Date, Reading time
   ═══════════════════════════════════════════ */
.article-meta-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 28px;
  padding: 16px 0;
  border-top: 1px solid var(--border-light);
  border-bottom: 1px solid var(--border-light);
}

.meta-author {
  display: flex;
  align-items: center;
  gap: 10px;
}

.author-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 13px;
  font-weight: 600;
  flex-shrink: 0;
}

.author-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.author-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
}

.author-role {
  font-size: 12px;
  color: var(--ink-faint);
  font-weight: 500;
  letter-spacing: 0.01em;
}

.btn-audio {
  display: inline-flex; align-items: center; gap: 10px;
  background: #1e293b; color: #fff; border: none;
  padding: 10px 20px; border-radius: var(--radius-md); cursor: pointer;
  font-family: var(--font-body); font-weight: 600; font-size: 0.9rem;
  transition: var(--transition); margin-top: 18px;
  box-shadow: 0 2px 8px rgba(30,41,59,0.2);
}
.btn-audio:hover { background: #0f172a; transform: translateY(-1px); }
.btn-audio .audio-icon { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; background: rgba(255,255,255,0.15); border-radius: 50%; }
.btn-audio .audio-text { flex: 1; }
.btn-audio .audio-duration { font-size: 0.75rem; color: #94a3b8; font-weight: 400; }
.btn-audio.playing { background: #c41e3a; }

.sticky-audio {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #0f172a; color: #fff; padding: 12px 20px;
  display: none; align-items: center; gap: 14px; z-index: 2000;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.3); font-family: var(--font-body);
}
.sticky-audio.visible { display: flex; }
.sticky-audio .audio-wave { display: flex; align-items: flex-end; gap: 3px; height: 24px; }
.sticky-audio .audio-wave span { width: 3px; background: #c41e3a; border-radius: 2px; animation: wave 1s ease-in-out infinite; }
.sticky-audio .audio-wave span:nth-child(2) { animation-delay: 0.1s; }
.sticky-audio .audio-wave span:nth-child(3) { animation-delay: 0.2s; }
.sticky-audio .audio-wave span:nth-child(4) { animation-delay: 0.3s; }
.sticky-audio .audio-wave span:nth-child(5) { animation-delay: 0.15s; }
.sticky-audio .audio-title { flex: 1; font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sticky-audio .audio-controls { display: flex; gap: 10px; }
.sticky-audio .audio-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
.sticky-audio .audio-btn:hover { background: rgba(255,255,255,0.2); }

.sparkline { display: inline-flex; align-items: center; height: 20px; margin-left: 8px; }
.sparkline svg { overflow: visible; }
.sparkline path { fill: none; stroke-width: 2; stroke-linecap: round; }
.sparkline.up path { stroke: #22c55e; }
.sparkline.down path { stroke: #ef4444; }
.sparkline.neutral path { stroke: #94a3b8; }

@keyframes wave {
  0%, 100% { height: 6px; }
  50% { height: 20px; }
}

.meta-stats {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 13px;
  color: var(--ink-faint);
  font-weight: 500;
  letter-spacing: 0.01em;
}

.meta-stats span {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

/* ═══════════════════════════════════════════
   HERO IMAGE — With Editorial Caption
   ═══════════════════════════════════════════ */
.figure-hero {
  margin: 0 0 44px 0;
  position: relative;
}

.figure-hero img {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  object-position: center 25%;
  border-radius: 4px;
  display: block;
  box-shadow: none;
  border: 1px solid var(--border-light);
}

.figure-caption {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-top: 14px;
  padding: 12px 0 0 0;
  border-top: 1px solid var(--ink);
}

.caption-line {
  width: 24px;
  height: 2px;
  background: var(--brand);
  margin-top: 10px;
  flex-shrink: 0;
}

.caption-text {
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.6;
  color: var(--ink-muted);
  font-weight: 400;
}

.caption-text strong {
  color: var(--ink);
  font-weight: 600;
}

.caption-credit {
  display: block;
  margin-top: 4px;
  font-size: 11px;
  color: var(--ink-faint);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ═══════════════════════════════════════════
   ARTICLE BODY — Typography
   ═══════════════════════════════════════════ */
.article-body {
  font-family: var(--font-serif);
  font-size: clamp(17px, 1.8vw, 20px);
  line-height: 1.75;
  color: var(--ink-soft);
}

.article-body p {
  margin-bottom: 1.6em;
  text-align: justify;
  hyphens: auto;
  -webkit-hyphens: auto;
}

/* DROP CAP — Letra Capital Editorial */
.article-body > p:first-of-type::first-letter {
  font-family: var(--font-serif);
  font-size: 5.2em;
  font-weight: 700;
  float: left;
  line-height: 0.78;
  margin-right: 14px;
  margin-top: 6px;
  color: var(--ink);
  text-shadow: 2px 2px 0 var(--border-light);
}

/* Primera línea en small caps opcional */
.article-body > p:first-of-type::first-line {
  font-variant: small-caps;
  font-weight: 600;
  letter-spacing: 0.02em;
}

/* ═══════════════════════════════════════════
   INLINE IMAGES WITHIN ARTICLE
   ═══════════════════════════════════════════ */
.article-figure {
  margin: 40px 0;
  position: relative;
}

.article-figure img {
  width: 100%;
  border-radius: var(--radius-sm);
  display: block;
  box-shadow: var(--shadow-sm);
}

.article-figure .figure-caption {
  border-top: none;
  border-left: 3px solid var(--brand);
  padding: 8px 0 8px 14px;
  margin-top: 10px;
}

.article-figure .caption-line {
  display: none;
}

/* ═══════════════════════════════════════════
   BLOCKQUOTE — Pull Quote Editorial
   ═══════════════════════════════════════════ */
.blockquote-pull {
  margin: 40px 0;
  padding: 28px 32px;
  background: var(--paper-accent);
  border-left: 4px solid var(--brand);
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  position: relative;
}

.blockquote-pull::before {
  content: '"';
  font-family: var(--font-serif);
  font-size: 64px;
  color: var(--brand);
  opacity: 0.15;
  position: absolute;
  top: -8px;
  left: 16px;
  line-height: 1;
}

.blockquote-pull p {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 600;
  font-style: italic;
  line-height: 1.45;
  color: var(--ink);
  position: relative;
  z-index: 1;
  margin-bottom: 12px;
}

.blockquote-pull cite {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-light);
  font-style: normal;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ═══════════════════════════════════════════
   PREMIUM PAYWALL — Elegant Gate
   ═══════════════════════════════════════════ */
.premium-gate {
  margin: 48px 0;
  padding: 48px 40px;
  background: linear-gradient(180deg, var(--premium-bg) 0%, #fff 100%);
  border: 1px solid var(--premium-border);
  border-radius: var(--radius-md);
  text-align: center;
  position: relative;
  overflow: hidden;
}

.premium-gate::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--premium-gold), #f59e0b, var(--premium-gold));
}

.premium-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, #fbbf24, #d97706);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 28px;
  color: white;
  box-shadow: 0 4px 16px rgba(217, 119, 6, 0.25);
}

.premium-gate h3 {
  font-family: var(--font-serif);
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 10px;
}

.premium-gate > p {
  font-size: 15px;
  color: var(--ink-muted);
  max-width: 420px;
  margin: 0 auto 28px;
  line-height: 1.6;
}

.premium-features {
  background: var(--paper);
  border-radius: var(--radius-md);
  padding: 24px;
  margin: 0 auto 28px;
  max-width: 400px;
  text-align: left;
  border: 1px solid var(--border-light);
}

.premium-features h4 {
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-light);
  margin-bottom: 16px;
  text-align: center;
}

.premium-features ul {
  list-style: none;
  display: grid;
  gap: 10px;
}

.premium-features li {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  color: var(--ink-muted);
}

.premium-features li i {
  color: var(--premium-gold);
  font-size: 14px;
  width: 18px;
  text-align: center;
}

.premium-cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 32px;
  background: linear-gradient(135deg, #f59e0b, #d97706);
  color: white;
  border: none;
  border-radius: 999px;
  font-family: var(--font-sans);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.25s ease;
  box-shadow: 0 4px 16px rgba(217, 119, 6, 0.3);
}

.premium-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(217, 119, 6, 0.4);
}

.premium-donate {
  display: block;
  margin-top: 16px;
  font-size: 13px;
  color: var(--ink-faint);
}

.premium-donate a {
  color: var(--premium-gold);
  font-weight: 600;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.content-veil {
  position: relative;

const PLACEHOLDERS = {
  'Sucesos': 'https://images.unsplash.com/photo-1588681664899-f142ff2dc9b1?w=1200&q=85',
  'Nacionales': 'https://images.unsplash.com/photo-1526666923127-b2970f64b422?w=1200&q=85',

  'Espectáculos': 'https://images.unsplash.com/photo-1516280440614-6697288d5d38?w=1200&q=85'
};

function repairImage(imgValue, categoria) {
  const fallback = PLACEHOLDERS[categoria] || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=1200&q=85';

  if (!imgValue || imgValue === "NaN" || imgValue === "null" || imgValue === "undefined" || imgValue === "") {
    return fallback;
  }
  if (typeof imgValue !== 'string') return fallback;

  if (imgValue.startsWith('data:image')) {
    if (imgValue.length > 100000) {
      console.warn('Base64 too large in noticia (' + imgValue.length + ' chars), using placeholder');
      return fallback;
    }
    return imgValue;
  }

  // Firebase Storage → extraer nombre y usar copia local (más rápida)
  if (imgValue.includes('firebasestorage.googleapis.com')) {
    try {
      const m = imgValue.match(/\/o\/(.+?)(\?|$)/);
      if (m) { const fn = decodeURIComponent(m[1]).split('/').pop(); if (fn && fn.length > 2) return `images/${fn}`; }
    } catch(e) {}
  }

  // GitHub/jsdelivr → extraer nombre del path
  if (imgValue.includes('githubusercontent.com') || imgValue.includes('github.com') || imgValue.includes('cdn.jsdelivr.net')) {
    try {
      const m = imgValue.match(/images\/([^/?#]+)/);
      if (m && m[1]) return `images/${m[1]}`;
    } catch(e) {}
  }

  // Otras URLs HTTP (Unsplash, etc.) → usar directo
  if (imgValue.startsWith('http://') || imgValue.startsWith('https://')) {
    return imgValue;
  }

  // Ruta local existente (ej: "images/foto.webp" o "/images/foto.webp")
  if (imgValue.startsWith('images/') || imgValue.startsWith('/images/')) {
    return imgValue;
  }

  // Solo nombre de archivo suelto → construir ruta local preservando nombre original
  let fileName = imgValue.split('/').pop().split('\\').pop().trim();
  if (!fileName || fileName.length < 2 || fileName.includes('collage')) return fallback;

  // Si ya tiene extensión de imagen, usar como está
  if (/\.(webp|jpg|jpeg|png|gif)$/i.test(fileName)) {
    return `images/${fileName}`;
  }

  // Sin extensión → asumir webp
  return `images/${fileName}.webp`;
}

function readingTime(text) {

  const mins = Math.ceil(words / 200);
  return `${mins} min de lectura`;
}

// ═══════════════════════════════════════════
// RENDER ARTICLE
// ═══════════════════════════════════════════
function renderArticle(n, docRef) {
  const isPremium = n.premium === true;
  const imgUrl = repairImage(n.imagen, n.categoria);
  const fechaStr = fmtDate(n.fecha);
  const readTime = readingTime(n.contenido || '');
  const autor = n.autor || 'Keyling Rivera M.';
  const autorInitial = autor.charAt(0).toUpperCase();

  // Update meta
  document.title = `${n.titulo} | Nicaragua Informate`;

  document.getElementById('ogTitle').content = n.titulo;
  document.getElementById('ogDescription').content = n.resumen || n.titulo;
  document.getElementById('ogImage').content = imgUrl;

  // Update Schema.org NewsArticle
  const schemaEl = document.getElementById('schemaNewsArticle');

    const fechaISO = n.fecha ? (n.fecha.toDate ? n.fecha.toDate().toISOString() : new Date(n.fecha).toISOString()) : new Date().toISOString();
    const fechaMod = n.fechaActualizacion ? (n.fechaActualizacion.toDate ? n.fechaActualizacion.toDate().toISOString() : new Date(n.fechaActualizacion).toISOString()) : fechaISO;
    schemaEl.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "NewsArticle",
      "headline": n.titulo,
      "description": n.resumen || n.titulo,
      "image": imgUrl,
      "datePublished": fechaISO,
      "dateModified": fechaMod,
      "author": {

        "name": autor,
        "url": "https://nicaraguainformate.com"
      },
      "publisher": {

        "name": "Nicaragua Informate",
        "logo": {

          "url": "https://nicaraguainformate.com/logo.png"
        }
      },
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": location.href

      "articleSection": n.categoria || 'General',
      "wordCount": (n.contenido || '').split(/\s+/).length

  // Update breadcrumb
  const bcCat = document.getElementById('breadcrumbCat');
  if (bcCat) bcCat.innerHTML = `<a href="/">${esc(n.categoria || 'General')}</a>`;
  document.getElementById('breadcrumbCurrent').textContent = esc(n.titulo).substring(0, 60) + (n.titulo.length > 60 ? '...' : '');

  // Process content paragraphs
  let contentIsHTML = false;
  function normalizeContent(text) {
    if (!text) return [];
    // Si ya tiene tags HTML <p>, extraer texto de cada párrafo
    if (/<p[>\s]/i.test(text)) {
      contentIsHTML = true;
      const matches = text.match(/<p[^>]*>(.*?)<\/p>/gis) || [];
      return matches.map(m => m.replace(/<\/?p[^>]*>/gi, '').trim()).filter(p => p.length > 0);
    }
    let cleaned = text
      .replace(/\n{3,}/g, '\n\n')
      .replace(/[ \t]+/g, ' ')
      .replace(/\n[ \t]+/g, '\n')
      .replace(/[ \t]+\n/g, '\n');
    return cleaned.split('\n\n').map(p => p.replace(/\s+/g, ' ').trim()).filter(p => p.length > 0);
  }
  const allPars = normalizeContent(n.contenido);

  // Build hero figure
  const creditText = n.pieFoto ? `${esc(n.pieFoto)} — ` : '';

  // Build article body

    bodyHTML = `

            <li><i class="fas fa-check-circle"></i> Lectura sin publicidad</li>
            <li><i class="fas fa-check-circle"></i> Análisis profundos y exclusivos</li>
            <li><i class="fas fa-check-circle"></i> Apoyo a nuestro trabajo periodístico</li>
          </ul>
        </div>

        <a href="https://paypal.me/NicaraguaInformate/5" target="_blank" rel="noopener noreferrer" class="premium-cta">
          <i class="fas fa-crown"></i>
          Suscribirme — $5/mes
        </a>

        <span class="premium-donate">
          ¿Prefieres donar una vez? <a href="https://paypal.me/NicaraguaInformate" target="_blank" rel="noopener noreferrer">Haz una donación</a>
        </span>
      </div>

      <div class="content-veil">

          ${hiddenPars.map(p => `<p>${contentIsHTML ? p : esc(p)}</p>`).join('')}

      </div>

  } else {
    bodyHTML = `
      <div class="article-body">
        ${allPars.map(p => `<p>${contentIsHTML ? p : esc(p)}</p>`).join('')}
      </div>

      <div class="share-panel">
        <div class="share-label">Compartir artículo</div>
        <div class="share-grid">
          <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}" target="_blank" rel="noopener noreferrer" class="share-chip facebook">
            <i class="fab fa-facebook-f"></i> Facebook

          <a href="https://wa.me/?text=${encodeURIComponent(n.titulo + ' — ' + location.href)}" target="_blank" rel="noopener noreferrer" class="share-chip whatsapp">
            <i class="fab fa-whatsapp"></i> WhatsApp
          </a>
          <a href="https://t.me/share/url?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent(n.titulo)}" target="_blank" rel="noopener noreferrer" class="share-chip telegram">
            <i class="fab fa-telegram-plane"></i> Telegram
          </a>
          <a href="https://twitter.com/intent/tweet?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent(n.titulo)}" target="_blank" rel="noopener noreferrer" class="share-chip twitter">

          </a>

      </div>

      <div class="tags-bar">
        <span class="tag">#${esc(n.categoria || 'General').replace(/\s/g, '')}</span>

      <div class="article-meta-bar">
        <div class="meta-author">
          <a href="/autor/keyling-rivera.html" style="display:flex; gap:10px; align-items:center; text-decoration:none;">
            <div class="author-avatar">${autorInitial}</div>

              <span class="author-name">${esc(autor)}</span>

  document.getElementById('articleContent').innerHTML = html;

  // Guardar texto para TTS
  window.niApp.currentAudioText = `${n.titulo}. ${n.resumen || ''}. ${typeof n.contenido === 'string' ? n.contenido.replace(/<[^>]*>/g, ' ').substring(0, 1200) : ''}`;
  if ('speechSynthesis' in window) { try { window.speechSynthesis.getVoices(); } catch(e){} }

  // Cargar noticias relacionadas

// ═══════════════════════════════════════════
// RELATED NEWS - PRIORIZA MISMA CATEGORÍA
// ═══════════════════════════════════════════
async function loadRelatedNews(categoria, currentId) {
  try {
    const q = query(
      collection(db, 'noticias'),
      where('categoria', '==', categoria),
      orderBy('fecha', 'desc'),
      limit(15)
    );
    const snap = await getDocs(q);
    const related = [];
    const usedIds = new Set([currentId]);
    
    snap.forEach(d => {
      if (!usedIds.has(d.id)) {
        related.push({ id: d.id, ...d.data(), prioridad: 1 });
        usedIds.add(d.id);
      }
    });

    const mismasCategoria = related.length;

    if (related.length === 0) {
      const container = document.getElementById('relatedNewsGrid');
      container.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--ink-light)"><i class="fas fa-inbox" style="font-size:2rem;margin-bottom:12px;display:block"></i><p>No hay noticias relacionadas disponibles</p></div>`;
      document.getElementById('relatedNews').style.display = 'block';
      return;
    }

    const container = document.getElementById('relatedNewsGrid');
    container.innerHTML = related.slice(0, 6).map(n => {
      const img = repairImage(n.imagen, n.categoria);
      const fecha = fmtDate(n.fecha);
      const esMismaCategoria = n.categoria === categoria;
      const cardClass = 'related-card ' + (esMismaCategoria ? 'related-card--same-cat' : 'related-card--other');
      const catClass = 'related-card__cat ' + (esMismaCategoria ? 'related-card__cat--same' : 'related-card__cat--other');
      return `
        <a href="/noticia.html?id=${n.id}" class="${cardClass}">
          <img src="${img}" alt="${esc(n.titulo)}" class="related-card__img" loading="lazy" onerror="this.onerror=null;this.src='${PLACEHOLDERS[n.categoria] || PLACEHOLDERS['Nacionales']}'">
          <div class="related-card__body">
            <div class="${catClass}">${esc(n.categoria || 'General')}</div>
            <h4 class="related-card__title">${esc(n.titulo)}</h4>
            <div class="related-card__date">${fecha}</div>
          </div>
        </a>
      `;
    }).join('');

    const relatedTitle = document.querySelector('#relatedNews h3');
    if (relatedTitle) {
      if (mismasCategoria >= 3) {
        relatedTitle.innerHTML = `<i class="fas fa-layer-group"></i> Más noticias de ${categoria}`;
      } else {
        relatedTitle.innerHTML = `<i class="fas fa-newspaper"></i> Noticias relacionadas`;
      }
    }

    document.getElementById('relatedNews').style.display = 'block';
  } catch (e) {
    console.error('Error cargando relacionadas:', e.message);
    const container = document.getElementById('relatedNewsGrid');
    container.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--ink-light)"><i class="fas fa-exclamation-triangle" style="font-size:2rem;margin-bottom:12px;display:block;color:#f59e0b"></i><p>Error al cargar noticias relacionadas</p><p style="font-size:12px;margin-top:8px;">${e.message}</p></div>`;
    document.getElementById('relatedNews').style.display = 'block';
  }
}

// ═══════════════════════════════════════════
// LOAD ARTICLE
// ═══════════════════════════════════════════
async function loadArticle() {
  try {
    let noticia = null;
    let docRef = null;

    if (noticiaId) {
      docRef = doc(db, 'noticias', noticiaId);
      const snap = await getDoc(docRef);
      if (snap.exists()) noticia = snap.data();
    } else if (noticiaSlug) {
      const q = query(collection(db, 'noticias'), where('slug', '==', noticiaSlug), limit(1));
      const snap = await getDocs(q);
      if (!snap.empty) {
        const d = snap.docs[0];
        noticia = d.data();
        docRef = doc(db, 'noticias', d.id);
      }
    }

    if (!noticia) {
      window.location.href = '/';
      return;
    }

    renderArticle(noticia, docRef);

    // Incrementar vistas
    const artId = noticiaId || docRef?.id;
    if (artId) {
      try {
        await fetch('/api/track-view', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ noticiaId: artId })
        });
      } catch(e) {}
    }

  } catch (err) {
    console.error('Error cargando noticia:', err);
    window.location.href = '/';
  }
}

// READING PROGRESS BAR
// ═══════════════════════════════════════════
function initProgress() {
  const bar = document.getElementById('readProgress');
  window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    bar.style.width = progress + '%';
  }, { passive: true });
}

// ═══════════════════════════════════════════
// AUDIO TTS
// ═══════════════════════════════════════════
let ttsSpeaking = false;

function toggleAudio() {
  if (!window.speechSynthesis) {
    alert('Tu navegador no soporta lectura de voz');
    return;
  }
  
  if (ttsSpeaking) {
    window.speechSynthesis.cancel();
    ttsSpeaking = false;
    updateAudioUI(false);
    return;
  }
  
  const text = window.niApp.currentAudioText || '';
  if (!text) {
    alert('No hay contenido para leer');
    return;
  }
  
  window.speechSynthesis.cancel();
  
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-ES';
  u.rate = 1;
  u.pitch = 1;
  
  u.onstart = () => { ttsSpeaking = true; updateAudioUI(true); };
  u.onend = () => { ttsSpeaking = false; updateAudioUI(false); };
  u.onerror = () => { ttsSpeaking = false; updateAudioUI(false); };
  
  window.speechSynthesis.speak(u);
}

function stopAudio() {
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
  }
  ttsSpeaking = false;
  updateAudioUI(false);
}

function updateAudioUI(playing) {
  const btn = document.getElementById('btnAudio');
  if (!btn) return;
  btn.classList.toggle('playing', playing);
}

// ═══════════════════════════════════════════
// THEME TOGGLE
// ═══════════════════════════════════════════
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('themeBtn');
  if (btn) btn.innerHTML = theme === 'dark' ? '<i class="fas fa-sun" aria-hidden="true"></i>' : '<i class="fas fa-moon" aria-hidden="true"></i>';
  try { localStorage.setItem('ni_theme', theme); } catch(e) {}
}

function initThemeToggle() {
  const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
  applyTheme(currentTheme);
  const btn = document.getElementById('themeBtn');
  if (!btn) return;
  btn.addEventListener('click', function() {
    const nextTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    applyTheme(nextTheme);
  });
}

// SHARE STICKY
// ═══════════════════════════════════════════
function initShareSticky() {
  const fb = document.getElementById('shareFb');
  const wa = document.getElementById('shareWa');
  const tw = document.getElementById('shareTw');
  const cp = document.getElementById('shareCopy');
  const refreshUrls = () => {
    const url = encodeURIComponent(location.href);
    const title = encodeURIComponent(document.title);
    if (fb) fb.href = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
    if (wa) wa.href = `https://wa.me/?text=${title}%20${url}`;
    if (tw) tw.href = `https://twitter.com/intent/tweet?url=${url}&text=${title}`;
  };
  refreshUrls();
  [fb, wa, tw].forEach(el => el && el.addEventListener('mousedown', refreshUrls));
  if (cp) cp.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(location.href);
      const icon = cp.querySelector('i');
      const prev = icon.className;
      icon.className = 'fas fa-check';
      cp.style.background = 'var(--brand)';
      cp.style.color = 'white';
      setTimeout(() => { icon.className = prev; cp.style.background = ''; cp.style.color = ''; }, 1500);
    } catch (e) {}
  });
}

function shareNative() {
  if (navigator.share) {
    navigator.share({
      title: document.title,
      text: document.querySelector('meta[name="description"]')?.content || '',
      url: window.location.href
    }).catch(function(){});
  } else {
    copyLinkMobile();
    alert('Enlace copiado al portapapeles. Pégalo donde quieras compartir.');
  }
}

function copyLinkMobile() {
  navigator.clipboard.writeText(window.location.href).then(function() {
    const btn = document.querySelector('#shareMobileBar button:nth-child(2)');
    if (!btn) return;
    const original = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check"></i><span>Copiado</span>';
    btn.style.color = 'var(--brand, #8c1d18)';
    setTimeout(function() {
      btn.innerHTML = original;
      btn.style.color = '';
    }, 2000);
  }).catch(function(){});
}
