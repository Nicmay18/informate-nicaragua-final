*, *::before, *::after {

.article-hero {

align-items: flex-end;
justify-content: center;
overflow: hidden;

}

.hero-background {
position: absolute;

}

.hero-background img {
width: 100%;
height: 100%;
object-fit: cover;
object-position: center;
filter: brightness(0.8);
transform: scale(1);
transition: transform 10s ease;
}

.article-hero:hover .hero-background img {
transform: scale(1.05);
}

.hero-overlay {
position: absolute;
inset: 0;
background: linear-gradient(to bottom,
rgba(0, 0, 0, 0.2) 0%,
rgba(0, 0, 0, 0.4) 50%,
rgba(0, 0, 0, 0.8) 100%);

}

.hero-vignette {
position: absolute;
inset: 0;
background: radial-gradient(ellipse at center,
transparent 0%,
rgba(0, 0, 0, 0.4) 100%);
z-index: -1;
}

.hero-content {
width: 100%;
max-width: var(--content-max-width);
padding: var(--space-xl) var(--space-md);
color: white;
z-index: 1;
}

.article-category {
display: inline-flex;
align-items: center;
gap: var(--space-xs);
font-size: 0.75rem;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 0.1em;
color: var(--color-accent);

padding: 0.5rem 1rem;
border-radius: 9999px;
margin-bottom: var(--space-md);
animation: fadeInDown 0.6s ease;
}

.article-category::before {
content: '';
width: 6px;
height: 6px;
background: var(--color-accent);
border-radius: 50%;
animation: pulse 2s infinite;
}

@keyframes pulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.5; }
}

@keyframes fadeInDown {
from {
opacity: 0;
transform: translateY(-20px);
}
to {

}

@keyframes fadeInUp {

transform: translateY(30px);
}
to {
opacity: 1;
transform: translateY(0);
}
}

<script>
const header = document.getElementById('siteHeader');
const hero = document.querySelector('.article-hero');

window.addEventListener('scroll', () => {
const heroBottom = hero.getBoundingClientRect().bottom;
if (heroBottom <= 100) {
header.classList.add('scrolled');
} else {
header.classList.remove('scrolled');
}
});

const observerOptions = {
root: null,
rootMargin: '0px',
threshold: 0.1
};

const observer = new IntersectionObserver((entries) => {
entries.forEach(entry => {
if (entry.isIntersecting) {
entry.target.classList.add('visible');
observer.unobserve(entry.target);
}
});
}, observerOptions);

document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

function shareFacebook() {
window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`, '_blank', 'width=600,height=400');
}

function shareTwitter() {
const title = encodeURIComponent(document.title);
window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(window.location.href)}&text=${title}`, '_blank', 'width=600,height=400');
}

function shareWhatsApp() {
const title = document.querySelector('.article-title').textContent;
const text = encodeURIComponent(`📰 ${title}\n\nLee más en: ${window.location.href}`);
window.open(`https://wa.me/?text=${text}`, '_blank');
}

function copyLink() {
navigator.clipboard.writeText(window.location.href).then(() => {
alert('¡Enlace copiado!');
});
}

// Inicializar AdSense
setTimeout(() => {
if (typeof adsbygoogle !== 'undefined') {
document.querySelectorAll('.adsbygoogle').forEach(() => {
try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
});
}
}, 1000);
</script>
